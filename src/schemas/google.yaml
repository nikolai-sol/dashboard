platform: google
display_name: Google Ads
source: mysql
source_key: google
source_type: ads
canonical_table: canonical_fact_ads_daily

tables:
  campaigns:
    table: ad_campaigns
    filter: "platform = 'google'"
    id_col: campaign_id
    name_col: name
  stats:
    table: ad_analytics_daily
    join_to: campaigns
    join_on: campaign_id
    filter: "platform = 'google'"
    date_col: report_date
    metrics:
      - { col: impressions, label: Impressions, type: int }
      - { col: clicks, label: Clicks, type: int }
      - { col: cost_local, label: Spend, type: decimal, currency: EUR }
      - { col: conversions, label: Conversions, type: int }
      - { col: video_views, label: Video Views, type: int }
      - { col: ctr, label: CTR, type: decimal, format: percent }
      - { col: cpm, label: CPM, type: decimal, currency: EUR }
      - { col: cpc, label: CPC, type: decimal, currency: EUR }
