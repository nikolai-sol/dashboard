<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ads Dashboard</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f7f8fb;
        --text: #111827;
        --muted: #6b7280;
        --line: #e5e7eb;
        --card: #ffffff;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: "DM Sans", sans-serif;
        background: radial-gradient(circle at 15% 0%, #eef4ff 0%, transparent 45%), var(--bg);
        color: var(--text);
      }
      .wrap {
        max-width: 1180px;
        margin: 0 auto;
        padding: 24px;
      }
      .row {
        display: grid;
        gap: 16px;
      }
      .kpi-grid {
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      }
      .card {
        background: var(--card);
        border: 1px solid #eff1f4;
        border-radius: 16px;
        box-shadow: 0 8px 30px rgba(17, 24, 39, 0.04);
      }
      .mono {
        font-family: "JetBrains Mono", monospace;
      }
      .table-wrap {
        overflow-x: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th,
      td {
        padding: 10px 12px;
        border-bottom: 1px solid #f3f4f6;
      }
      th {
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-size: 11px;
        color: #9ca3af;
        text-align: right;
      }
      th:first-child,
      td:first-child {
        text-align: left;
      }
      @media (max-width: 760px) {
        .wrap {
          padding: 16px;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./app.js"></script>
  </body>
</html>
